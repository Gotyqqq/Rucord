# Исправленный конфиг для rucord.fun
# Скопируй содержимое в /etc/nginx/vhosts/www-root/rucord.fun.conf на сервере

server {
    server_name rucord.fun www.rucord.fun;
    charset off;
    index index.php index.html;
    disable_symlinks if_not_owner from=$root_path;
    include /etc/nginx/vhosts-includes/*.conf;
    include /etc/nginx/vhosts-resources/rucord.fun/*.conf;
    include /etc/nginx/users-resources/www-root/*.conf;
    access_log /var/www/httpd-logs/rucord.fun.access.log;
    error_log /var/www/httpd-logs/rucord.fun.error.log notice;
    ssi on;
    set $root_path /var/www/www-root/data/root/Rucord/frontend/dist;
    root $root_path;
    listen 92.63.107.123:80;
    gzip on;
    gzip_comp_level 5;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript;

    return 301 https://$host$request_uri;
}

server {
    server_name rucord.fun www.rucord.fun;
    ssl_certificate "/var/www/httpd-cert/www-root/rucord.fun_le3.crtca";
    ssl_certificate_key "/var/www/httpd-cert/www-root/rucord.fun_le3.key";
    ssl_ciphers EECDH:+AES256:-3DES:RSA+AES:!NULL:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_dhparam /etc/ssl/certs/dhparam4096.pem;
    charset off;
    index index.php index.html;
    disable_symlinks if_not_owner from=$root_path;
    include /etc/nginx/vhosts-includes/*.conf;
    include /etc/nginx/vhosts-resources/rucord.fun/*.conf;
    include /etc/nginx/users-resources/www-root/*.conf;
    access_log /var/www/httpd-logs/rucord.fun.access.log;
    error_log /var/www/httpd-logs/rucord.fun.error.log notice;
    ssi on;
    set $root_path /var/www/www-root/data/root/Rucord/frontend/dist;
    root $root_path;
    listen 92.63.107.123:443 ssl;
    gzip on;
    gzip_comp_level 5;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml application/xml+rss text/javascript application/javascript;

    # API бэкенда Rucord
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (сокеты Rucord)
    location /socket.io {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
        location ~* ^.+\.(jpg|jpeg|gif|png|svg|js|css|mp3|ogg|mpe?g|avi|zip|gz|bz2?|rar|swf|webp|woff|woff2)$ {
            expires 24h;
        }
    }
}
